# Dark-mode example — v0.1.1.
#
# Demonstrates the optional `backgrounds: { default, dark }` form and the
# `settings.dark_mode` switch. A mix of floors with and without dark
# variants illustrates the graceful fallback (default image used + a
# one-time console warning for the floor without a variant).
#
# Place your floor plan files under `<config>/www/floor-plans/`.

type: custom:floor-navigator-card
viewbox: "0 0 1920 1080"

settings:
  # auto = follow the HA theme via hass.themes.darkMode, or
  #        prefers-color-scheme as a fallback (default)
  # on   = force dark
  # off  = force light + don't even render the dark <image> in the DOM
  dark_mode: auto
  transition: crossfade
  transition_duration: 400
  edge_behavior: bounce
  show_floor_indicator: true
  overlay_buttons_position: bottom

floors:
  # Extended form with both default and dark variants
  - id: L0
    name: "Ground floor"
    backgrounds:
      default: /local/floor-plans/L0-day.png
      dark: /local/floor-plans/L0-night.png

  # Extended form with only one variant → no fallback warning:
  # `default` is used in both light AND dark mode (equivalent to the
  # short form, but with the extended structure already in place to add
  # a `dark` variant later).
  - id: L1
    name: "First floor"
    backgrounds:
      default: /local/floor-plans/L1-day.png
      # dark variant to come → in dark mode the default image is used
      # and a console warning is emitted once at mount

  # Short v0.1.0 form → 100% backward-compatible, fallback identical to
  # L1 above
  - id: L2
    name: "Office and attic"
    background: /local/floor-plans/L2.png

overlays:
  - id: lights
    name: Lights
    icon: mdi:lightbulb
    default_visible: true
    elements:
      - floor: L0
        entity: light.salon
        position: { x: 600, y: 450 }
        type: icon
        tap_action: toggle
      - floor: L1
        entity: light.chambre
        position: { x: 800, y: 350 }
        type: icon
        tap_action: toggle

  - id: temperature
    name: Temperatures
    icon: mdi:thermometer
    default_visible: false
    elements:
      - floor: L0
        entity: sensor.salon_temperature
        position: { x: 700, y: 540 }
        type: text
        precision: 1
        font_size: 32
      - floor: L1
        entity: sensor.chambre_temperature
        position: { x: 850, y: 380 }
        type: text
        precision: 1
        font_size: 32
