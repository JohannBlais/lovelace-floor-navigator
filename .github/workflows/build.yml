name: build

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      # Bundle threshold history:
      # - v0.1.0/v0.1.1: 50 KiB (51200) — ADR-003 anti-bloat discipline
      # - v0.2.0 spec 1 (overlay-readability): temporary 58 KiB
      # - v0.2.0 spec 2 (pan-zoom-interactions): formalised at 78 KiB
      #   per ADR-007 (specs/decisions.md). 71.3 KiB measured + headroom
      #   for spec 3 (mobile-fullscreen-mode) and polish.
      - name: Check bundle size (78 KiB, ADR-007)
        run: |
          SIZE=$(stat -c%s dist/floor-navigator.js)
          echo "Bundle size: $SIZE bytes ($(awk "BEGIN { printf \"%.1f\", $SIZE / 1024 }") KiB)"
          if [ "$SIZE" -gt 79872 ]; then
            echo "::error::Bundle exceeds 78 KiB v0.2.0 threshold ($SIZE bytes > 79872) — see ADR-007"
            exit 1
          fi
